<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ReadFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<section class="login-container">
    <div class="login-card">

        <h1>ReadFlow</h1>
        <p>Escolha seu perfil e acesse o sistema</p>

        <div class="perfil-options">
            <button type="button" class="perfil-card active" data-perfil="ADMIN">
                <i class="bi bi-person-gear"></i>
                <span>Administrador</span>
            </button>

            <button type="button" class="perfil-card" data-perfil="PROFESSOR">
                <i class="bi bi-person-video3"></i>
                <span>Professor</span>
            </button>

            <button type="button" class="perfil-card" data-perfil="ALUNO">
                <i class="bi bi-mortarboard"></i>
                <span>Aluno</span>
            </button>
        </div>

        <form method="POST">
            {{ form.hidden_tag() }}
            <input type="hidden" name="perfilSelecionado" id="perfilSelecionado" value="ADMIN">
            <div class="form-group">
                {{ form.email.label }}
                {{ form.email(placeholder="Digite seu email") }}
            </div>
            <div class="form-group">
                {{ form.senha.label }}
                {{ form.senha(placeholder="Digite sua senha") }}
            </div>
            {{ form.submit(class="btn-login") }}
        </form>
        <a href="{{ url_for('index') }}" class="voltar">
            Voltar para o início
        </a>
    </div>
</section>

<script>
    const cards = document.querySelectorAll('.perfil-card');
    const perfilInput = document.getElementById('perfilSelecionado');

    cards.forEach(card => {
        card.addEventListener('click', () => {
            cards.forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            perfilInput.value = card.dataset.perfil;
        });
    });
</script>
</body>
</html>
