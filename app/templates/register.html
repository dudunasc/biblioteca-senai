{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 3rem auto;">
  <form method="post" action="{{ url_for('register') }}">
    <h2> Criar Conta</h2>
    <p style="color: #7f8c8d; margin-bottom: 1.5rem;">Registre-se na Biblioteca </p>
    
    <label for="nome"> Nome Completo</label>
    <input type="text" id="nome" name="nome" required>
    
    <label for="email"> Email</label>
    <input type="email" id="email" name="email" required>
    
    <label for="senha"> Senha</label>
    <input type="password" id="senha" name="senha" required>
    
    <label for="perfil"> Perfil</label>
    <select id="perfil" name="perfil" required>
      <option value="Aluno"> Aluno</option>
      <option value="Professor"> Professor</option>
      <option value="Administrador"> Administrador</option>
    </select>
    
    <input type="submit" value="Cadastrar">
    
    <p style="text-align: center; margin-top: 1.5rem; color: #7f8c8d;">
      Já tem conta? <a href="{{ url_for('login') }}">Entre aqui</a>
    </p>
  </form>
</div>
{% endblock %}
