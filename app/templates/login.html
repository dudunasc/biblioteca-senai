{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 3rem auto;">
  <form method="post" action="{{ url_for('login') }}">
    <h2> Login</h2>
    <p style="color: #7f8c8d; margin-bottom: 1.5rem;">Acesse sua conta na Biblioteca </p>
    
    <label for="email"> Email</label>
    <input type="email" id="email" name="email" required>
    
    <label for="senha"> Senha</label>
    <input type="password" id="senha" name="senha" required>
    
    <input type="submit" value="Entrar">
    
    <p style="text-align: center; margin-top: 1.5rem; color: #7f8c8d;">
      Ainda não tem conta? <a href="{{ url_for('register') }}">Cadastre-se aqui</a>
    </p>
  </form>
</div>
{% endblock %}
