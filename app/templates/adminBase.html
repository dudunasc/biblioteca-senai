<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ReadFlow{% endblock %}</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/adminBase.css') }}">

    {% block css %}
    {% endblock %}

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="page-layout">
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-book-half"></i>
            <h2>ReadFlow</h2>
        </div>

        <nav class="menu">
            <a href="{{ url_for('dashboardAdmin') }}">
                <i class="bi bi-grid-1x2-fill"></i>
                Dashboard
            </a>

            <a href="{{ url_for('cadastrar_usuario') }}">
                <i class="bi bi-people-fill"></i>
                Usuários
            </a>

            <a href="{{ url_for('cadastrar_livro') }}">
                <i class="bi bi-book-fill"></i>
                Livros
            </a>

            <a href="{{ url_for('listarCategorias') }}">
                <i class="bi bi-tags-fill"></i>
                Categorias
            </a>

            <a href="{{ url_for('realizar_emprestimo') }}">
                <i class="bi bi-arrow-left-right"></i>
                Empréstimos
            </a>

            <a href="{{ url_for('relatorio') }}">
                <i class="bi bi-bar-chart-fill"></i>
                Relatórios
            </a>
        </nav>

        <a href="{{ url_for('logout') }}" class="logout">
            <i class="bi bi-box-arrow-right"></i>
            Sair
        </a>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>{% block page_title %}{% endblock %}</h1>
                <p>{% block page_description %}{% endblock %}</p>
            </div>

            <div class="user-info">
                <i class="bi bi-person-circle"></i>
                <span>{{ current_user.nome }}</span>
            </div>
        </header>

        {% block content %}
        {% endblock %}

    </main>
</div>
</body>
</html>
