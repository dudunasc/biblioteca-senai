{% extends 'base.html' %}

{% block content %}

<h2>Login</h2>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.email.label }}
        {{ form.email() }}
    </p>

    <p>
        {{ form.senha.label }}
        {{ form.senha() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

{% endblock %}
